name: Makefile CI

on:
  push:
    branches: [ "master" ]
    tags:
     - "v*"
  pull_request:
    branches: [ "master" ]
    tags:
     - "v*"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: tools/prerequisites install # -y

    - name: configure
      run: make oldconfig

    - name: make
      run: make
    - name: Find IMAGE_PATH
      run: |
            image_path=`find ${{ github.workspace }} -name "*.image" -type f | grep _freetz-ng`
            export IMG_PATH=$image_path
            echo "IMG_PATH=$image_path" >> $GITHUB_ENV
            find ${{ github.workspace }} -name "*.image" -type f | grep _freetz-ng
            asset_path=`basename ${{ env.IMG_PATH }}`
            echo "ASSET_PATH=$asset_path" >> $GITHUB_ENV
      id: find_image_path
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
    - name: Upload Release Asset
      id: upload-release-asset 
      uses: actions/upload-release-asset@v1
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: ${{ env.IMG_PATH }}
          asset_name: ${{ env.ASSET_PATH }}
          asset_content_type: application/zip
